<!-- Maskable: safe zone = center 80%. Padding 10% on each side = 51px on 512px canvas -->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#FF8B7B"/>
  <defs>
    <linearGradient id="c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB1A3"/>
      <stop offset="100%" stop-color="#FF7867"/>
    </linearGradient>
    <linearGradient id="s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A7D2EC"/>
      <stop offset="100%" stop-color="#5BA4D2"/>
    </linearGradient>
  </defs>
  <!-- Heart scaled down into safe zone -->
  <path d="M 256 150 C 240 130, 210 118, 185 118 C 148 118, 120 147, 120 180 C 120 222, 170 262, 240 322 L 256 336 L 256 150 Z" fill="url(#c)"/>
  <path d="M 256 150 C 272 130, 302 118, 327 118 C 364 118, 392 147, 392 180 C 392 222, 342 262, 272 322 L 256 336 L 256 150 Z" fill="url(#s)"/>
  <rect x="210" y="225" width="92" height="16" rx="8" fill="#FFF8F1" opacity="0.92"/>
</svg>
